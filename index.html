<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Palavrix - Descobre a Palavra!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #121213;
      color: #fff;
      font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      width: 100%;
      max-width: 500px;
      border-bottom: 1px solid #3a3a3c;
      padding: 12px 16px 8px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.15rem;
      text-transform: uppercase;
    }

    .header-btn {
      visibility: hidden;
      background: transparent;
      color: #565758;
      font-size: 1.4rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.15s;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
    }

    .header-btn:hover {
      color: #fff;
    }

    #trophy-btn {
      left: 16px;
    }

    #random-btn, #share-icon-btn {
      right: 16px;
    }

    .header-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #3a3a3c;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    .header-btn:hover::after {
      opacity: 1;
    }

    #board-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-grow: 1;
      min-height: 0;
      padding: 10px 0;
      overflow: hidden;
    }

    #board-wrapper {
      position: relative;
    }

    #board {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 5px;
      height: 370px;
    }

    .row {
      display: grid;
      gap: 5px;
    }

    .tile {
      width: 100%;
      border: 2px solid #3a3a3c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      text-transform: uppercase;
      color: #fff;
      user-select: none;
      transition: border-color 0.1s;
    }

    .tile[data-letter] {
      border-color: #565758;
      animation: pop 0.1s ease-in-out;
    }

    @keyframes pop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.12);
      }

      100% {
        transform: scale(1);
      }
    }

    .tile.flip {
      animation: flip 0.5s ease forwards;
    }

    @keyframes flip {
      0% {
        transform: rotateX(0deg);
      }

      50% {
        transform: rotateX(-90deg);
        background: transparent;
        border-color: #565758;
      }

      100% {
        transform: rotateX(0deg);
      }
    }

    .tile.correct {
      background: #538d4e;
      border-color: #538d4e;
    }

    .tile.present {
      background: #b59f3b;
      border-color: #b59f3b;
    }

    .tile.absent {
      background: #3a3a3c;
      border-color: #3a3a3c;
    }

    .tile.shake {
      animation: shake 0.5s ease;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-4px);
      }

      40% {
        transform: translateX(4px);
      }

      60% {
        transform: translateX(-4px);
      }

      80% {
        transform: translateX(4px);
      }
    }

    .tile.bounce {
      animation: bounce 0.1s ease forwards;
    }

    @keyframes bounce {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-20px);
      }

      100% {
        transform: translateY(0);
      }
    }

    #keyboard {
      margin-bottom: max(8px, env(safe-area-inset-bottom, 8px));
      width: 100%;
      max-width: 500px;
      padding: 0 8px;
      flex-shrink: 0;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 6px;
    }

    .key {
      height: 58px;
      border-radius: 4px;
      border: none;
      background: #818384;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      min-width: 0;
      padding: 0;
      transition: background 0.2s;
    }

    .key.wide {
      flex: 1.5;
      font-size: 0.75rem;
    }

    .key:active {
      filter: brightness(0.8);
    }

    .key.correct {
      background: #538d4e;
    }

    .key.present {
      background: #b59f3b;
    }

    .key.absent {
      background: #3a3a3c;
    }

    @media (max-height: 680px) {
      #keyboard {
        margin-bottom: 4px;
      }

      .keyboard-row {
        margin-bottom: 4px;
      }

      .key {
        height: 44px;
      }
    }

    /* Floating toast anchored above a board row */
    #toast {
      position: absolute;
      left: 50%;
      transform: translateX(-50%) translateY(-100%);
      background: #fff;
      color: #121213;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 7px 16px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }

    #toast.visible {
      opacity: 1;
    }

  </style>
</head>

<body>

  <header>
    <button id="trophy-btn" class="header-btn" data-tooltip="ganhou!">🏆</button>
    <h1>Palavrix<span style="color:#b59f3b">5</span></h1>
    <button id="random-btn" class="header-btn" data-tooltip="palavra aleatória">🎲</button>
    <button id="share-icon-btn" class="header-btn" data-tooltip="partilhar">📤</button>
  </header>

  <div id="board-container">
    <div id="board-wrapper">
      <div id="toast"></div>
      <div id="board"></div>
    </div>
  </div>

  <div id="keyboard"></div>


<script>
    const MAX_GUESSES = 6;
    const WORD_LENGTH = 5;
    const EPOCH = new Date('2024-01-01T00:00:00Z');

    function getDateParam() {
      const hash = location.hash.replace('#', '');
      const dateMatch = hash.match(/(\d{8})/);
      if (dateMatch) {
        const raw = dateMatch[1];
        return `${raw.slice(0, 4)}-${raw.slice(4, 6)}-${raw.slice(6, 8)}`;
      }
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function dateToWordIndex(dateStr) {
      const selected = new Date(dateStr + 'T00:00:00Z');
      const dayOffset = Math.floor((selected - EPOCH) / 86400000);
      return ((dayOffset % wordList.length) + wordList.length) % wordList.length;
    }

    const KEYBOARD_ROWS = [
      ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
      ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
      ['Enter', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '⌫']
    ];

    let WORD = '';
    let wordList = [];
    let currentRow = 0;
    let currentCol = 0;
    let currentGuess = [];
    let gameOver = false;
    let tiles = [];
    let keyMap = {};
    let tileSize = 57;
    let toastTimer = null;
    let guessResults = [];

    function showToast(msg, aboveRow) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      // Position the toast so its bottom is 8px above the target row
      const rowHeight = tileSize + 5;
      toast.style.top = (aboveRow * rowHeight - 8) + 'px';
      toast.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 1800);
    }

    function buildBoard() {
      tileSize = Math.max(36, Math.floor(310 / WORD_LENGTH) - 5);
      const boardWidth = (tileSize + 5) * WORD_LENGTH - 5;
      const fontSize = Math.max(1, tileSize * 0.55) + 'px';

      const board = document.getElementById('board');
      board.style.width = boardWidth + 'px';
      board.innerHTML = '';
      tiles = [];

      for (let r = 0; r < MAX_GUESSES; r++) {
        const row = document.createElement('div');
        row.classList.add('row');
        row.style.gridTemplateColumns = `repeat(${WORD_LENGTH}, ${tileSize}px)`;
        const rowTiles = [];
        for (let c = 0; c < WORD_LENGTH; c++) {
          const tile = document.createElement('div');
          tile.classList.add('tile');
          tile.style.fontSize = fontSize;
          tile.style.height = tileSize + 'px';
          row.appendChild(tile);
          rowTiles.push(tile);
        }
        board.appendChild(row);
        tiles.push(rowTiles);
      }
    }

    function buildKeyboard() {
      const keyboard = document.getElementById('keyboard');
      keyboard.innerHTML = '';
      keyMap = {};
      KEYBOARD_ROWS.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.classList.add('keyboard-row');
        row.forEach(key => {
          const btn = document.createElement('button');
          btn.classList.add('key');
          btn.textContent = key;
          if (key === 'Enter' || key === '⌫') btn.classList.add('wide');
          btn.addEventListener('click', () => handleKey(key));
          rowEl.appendChild(btn);
          keyMap[key] = btn;
        });
        keyboard.appendChild(rowEl);
      });
    }

    function handleKey(key) {
      if (gameOver) return;

      if (key === '⌫' || key === 'Backspace') {
        deleteLetter();
      } else if (key === 'Enter') {
        submitGuess();
      } else if (/^[A-Za-záéíóúâêôãõàüç]$/i.test(key)) {
        addLetter(key.toUpperCase());
      }
    }

    function setRandomBtn(visible) {
      document.getElementById('random-btn').style.visibility = visible ? 'visible' : 'hidden';
    }

    function showEndButtons(won) {
      document.getElementById('random-btn').style.visibility = 'hidden';
      document.getElementById('share-icon-btn').style.visibility = 'visible';
      if (won) document.getElementById('trophy-btn').style.visibility = 'visible';
    }

    function fillRandom() {
      if (currentRow !== 0 || currentCol !== 0 || gameOver) return;
      const word = wordList[Math.floor(Math.random() * wordList.length)];
      word.toUpperCase().split('').forEach(letter => addLetter(letter));
      setRandomBtn(false);
      submitGuess();
    }

    function addLetter(letter) {
      if (currentCol >= WORD_LENGTH) return;
      const tile = tiles[currentRow][currentCol];
      tile.textContent = letter;
      tile.setAttribute('data-letter', letter);
      currentGuess.push(letter);
      currentCol++;
      if (currentRow === 0 && currentCol === 1) setRandomBtn(false);
    }

    function deleteLetter() {
      if (currentCol <= 0) return;
      currentCol--;
      currentGuess.pop();
      const tile = tiles[currentRow][currentCol];
      tile.textContent = '';
      tile.removeAttribute('data-letter');
    }

    function submitGuess() {
      if (currentCol < WORD_LENGTH) {
        shakeRow(currentRow);
        showToast('Palavra incompleta', currentRow);
        return;
      }

      const guess = currentGuess.join('').toLowerCase();
      if (!wordList.includes(guess)) {
        shakeRow(currentRow);
        showToast('Palavra não encontrada', currentRow);
        return;
      }

      const result = evaluateGuess(guess.toUpperCase());
      revealRow(currentRow, result, guess.toUpperCase());
    }

    function evaluateGuess(guess) {
      const result = Array(WORD_LENGTH).fill('absent');
      const wordArr = WORD.split('');
      const guessArr = guess.split('');
      const used = Array(WORD_LENGTH).fill(false);

      for (let i = 0; i < WORD_LENGTH; i++) {
        if (guessArr[i] === wordArr[i]) {
          result[i] = 'correct';
          used[i] = true;
          guessArr[i] = null;
        }
      }

      for (let i = 0; i < WORD_LENGTH; i++) {
        if (guessArr[i] === null) continue;
        for (let j = 0; j < WORD_LENGTH; j++) {
          if (!used[j] && guessArr[i] === wordArr[j]) {
            result[i] = 'present';
            used[j] = true;
            break;
          }
        }
      }

      return result;
    }

    function revealRow(row, result, guess) {
      const rowTiles = tiles[row];
      let delay = 0;
      const flipDuration = 500;

      rowTiles.forEach((tile, i) => {
        setTimeout(() => {
          tile.classList.add('flip');
          setTimeout(() => {
            tile.classList.add(result[i]);
            updateKey(guess[i], result[i]);
          }, flipDuration / 2);
        }, delay);
        delay += 300;
      });

      const totalDelay = delay;

      setTimeout(() => {
        guessResults.push(result);
        const won = result.every(r => r === 'correct');
        currentRow++;
        currentCol = 0;
        currentGuess = [];

        if (won) {
          gameOver = true;
          bounceRow(row);
          showEndButtons(true);
        } else if (currentRow >= MAX_GUESSES) {
          gameOver = true;
          showEndButtons(false);
        }
      }, totalDelay + flipDuration);
    }

    function updateKey(letter, state) {
      const btn = keyMap[letter];
      if (!btn) return;
      const priority = { correct: 3, present: 2, absent: 1 };
      const current = btn.classList.contains('correct') ? 3
        : btn.classList.contains('present') ? 2
          : btn.classList.contains('absent') ? 1 : 0;
      if (priority[state] > current) {
        btn.classList.remove('correct', 'present', 'absent');
        btn.classList.add(state);
      }
    }

    function shakeRow(row) {
      tiles[row].forEach(tile => {
        tile.classList.add('shake');
        tile.addEventListener('animationend', () => tile.classList.remove('shake'), { once: true });
      });
    }

    function bounceRow(row) {
      tiles[row].forEach((tile, i) => {
        setTimeout(() => {
          tile.classList.add('bounce');
          tile.addEventListener('animationend', () => tile.classList.remove('bounce'), { once: true });
        }, i * 100);
      });
    }

    function initGame() {
      const idx = dateToWordIndex(getDateParam());
      WORD = wordList[idx].toUpperCase();

      currentRow = 0;
      currentCol = 0;
      currentGuess = [];
      gameOver = false;
      guessResults = [];
      document.getElementById('trophy-btn').style.visibility = 'hidden';
      document.getElementById('share-icon-btn').style.visibility = 'hidden';
      setRandomBtn(true);
      buildBoard();
      buildKeyboard();
    }

    function loadAndStart() {
      fetch(`palavras-${WORD_LENGTH}.json`)
        .then(r => {
          if (!r.ok) throw new Error(`Lista de palavras de ${WORD_LENGTH} letras não disponível`);
          return r.json();
        })
        .then(data => {
          wordList = data;
          initGame();
        })
        .catch(err => {
          showToast(err.message, 0);
        });
    }

    function shareResult() {
      const EMOJI = { correct: '🟩', present: '🟨', absent: '⬛' };
      const idx = dateToWordIndex(getDateParam());
      const won = guessResults.at(-1).every(r => r === 'correct');
      const score = won ? guessResults.length : 'X';
      const grid = guessResults.map(row => row.map(s => EMOJI[s]).join('')).join('\n');
      const url = window.location.href;
      const text = `Palavrix #${idx + 1} ${score}/${MAX_GUESSES}\n\n${grid}\n\n${url}`;

      if (navigator.share) {
        navigator.share({ text }).catch(() => copyToClipboard(text));
      } else {
        copyToClipboard(text);
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text)
        .then(() => showToast('Copiado!', 0))
        .catch(() => showToast('Erro ao copiar', 0));
    }

    document.getElementById('share-icon-btn').addEventListener('click', shareResult);
    document.getElementById('random-btn').addEventListener('click', fillRandom);
    document.addEventListener('keydown', e => handleKey(e.key));

    loadAndStart();
  </script>
</body>

</html>
